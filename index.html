<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>¡Nos vamos a Cusco Amorcito!</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f5f5f5;
    color:#333;
}

.hero{
    height:100vh;
    background:url("img/machupicchu.jpg") center center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero div{
    background:rgba(0,0,0,.55);
    padding:30px;
    border-radius:20px;
    color:white;
    max-width:700px;
}

.hero h1{
    font-size:55px;
    margin-bottom:15px;
}

.hero p{
    font-size:22px;
}

.indicacion{
    margin-top:20px;
    font-size:18px;
    opacity:.9;
}

.pasaje{
    padding:50px 20px;
    display:flex;
    justify-content:center;
}

.pasaje img{
    width:100%;
    max-width:800px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.3);
}

/* Diseño para celulares */

@media (max-width:768px){

.hero h1{
    font-size:34px;
}

.hero p{
    font-size:18px;
}

.hero div{
    padding:25px;
}

.indicacion{
    font-size:16px;
}

}

</style>

</head>

<body>

<div class="hero">

    <div>

        <h1>🏔️ ¡Nos vamos a Cusco Amorcito Pechocha!</h1>

        <p>Una aventura inolvidable nos espera. ❤️</p>

        <div class="indicacion">
            ↓ Desliza para ver tu sorpresa ↓
        </div>

    </div>

</div>

<div class="pasaje">

    <img src="img/pasaje.jpg" alt="Pasaje de viaje">

</div>

</body>
</html>
