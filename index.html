<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>¡Nos vamos a Cusco Amorcito!</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f5f5f5;
color:#333;
}

.hero{
height:100vh;
background:url("img/machupicchu.jpg") center center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.hero div{
background:rgba(0,0,0,.55);
padding:40px;
border-radius:20px;
color:white;
}

.hero h1{
font-size:55px;
margin-bottom:15px;
}

.hero p{
font-size:22px;
}

section{
padding:70px 20px;
max-width:1000px;
margin:auto;
}

h2{
text-align:center;
margin-bottom:30px;
font-size:35px;
color:#2e7d32;
}

.pasaje{
display:flex;
justify-content:center;
}

.pasaje img{
width:100%;
max-width:800px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
transition:.3s;
}

.pasaje img:hover{
transform:scale(1.03);
}

.frase{
margin-top:60px;
text-align:center;
font-size:22px;
line-height:1.8;
}

footer{
background:#1b5e20;
color:white;
padding:25px;
text-align:center;
margin-top:60px;
}

</style>

</head>

<body>

<div class="hero">

<div>

<h1>🏔️ ¡Nos vamos a Cusco Amorcito Pechocha!</h1>

<p></p>

</div>

</div>

<section>

<h2>🎫 Tu Pasaje</h2>

<div class="pasaje">

<img src="img/pasaje.jpg" alt="Pasaje de viaje">

</div>

<div class="frase">

<p>
Gracias por acompañarnos en esta aventura.
<br><br>
Muy pronto recorreremos uno de los destinos más increíbles del mundo.
<br><br>
<strong>¡Nos vemos en Cusco! ✈️🇵🇪</strong>
</p>

</div>

</section>

<footer>

Viaje a Cusco • 2026

</footer>

</body>
</html>
